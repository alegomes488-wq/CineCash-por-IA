<!DOCTYPE html>
<html>
<head>
    <title>Upload APK - CineCash</title>
    <style>
        body { font-family: Arial, sans-serif; max-width: 600px; margin: 50px auto; padding: 20px; background: #1a1a2e; color: white; }
        h1 { color: #7c3aed; }
        .upload-area { border: 3px dashed #7c3aed; padding: 40px; text-align: center; border-radius: 15px; margin: 20px 0; cursor: pointer; }
        .upload-area:hover { background: #2a2a4e; }
        button { background: #7c3aed; color: white; padding: 15px 30px; border: none; border-radius: 10px; cursor: pointer; font-size: 16px; }
        button:hover { background: #6d28d9; }
        .progress { width: 100%; height: 20px; background: #333; border-radius: 10px; margin: 20px 0; display: none; }
        .progress-bar { height: 100%; background: #34d399; border-radius: 10px; width: 0%; transition: width 0.3s; }
        #result { margin: 20px 0; padding: 20px; border-radius: 10px; display: none; }
        .success { background: #065f46; }
        .error { background: #7f1d1d; }
        a { color: #60a5fa; }
        .info { background: #1e3a8a; padding: 15px; border-radius: 10px; margin: 20px 0; }
    </style>
</head>
<body>
    <h1>📱 Upload do APK - CineCash</h1>
    
    <div class="info">
        <strong>Instruções:</strong><br>
        1. Selecione o arquivo APK abaixo<br>
        2. Clique em "Enviar para Storage"<br>
        3. Aguarde o upload terminar<br>
        4. Copie a URL gerada
    </div>

    <div class="upload-area" onclick="document.getElementById('fileInput').click()">
        <p>📂 Clique aqui ou arraste o arquivo APK</p>
        <p style="color: #888; font-size: 14px;">app-debug.apk (~4MB)</p>
        <input type="file" id="fileInput" accept=".apk" style="display: none" onchange="fileSelected(this)">
    </div>
    
    <div id="fileInfo" style="margin: 20px 0; display: none;">
        <p>📱 <strong id="fileName"></strong></p>
        <p>Tamanho: <span id="fileSize"></span></p>
    </div>

    <div class="progress" id="progressContainer">
        <div class="progress-bar" id="progressBar"></div>
    </div>
    <p id="status" style="color: #888;"></p>

    <button id="uploadBtn" onclick="uploadFile()" style="display: none; width: 100%;">
        🚀 Enviar para Firebase Storage
    </button>

    <div id="result"></div>

    <script>
        let selectedFile = null;

        function fileSelected(input) {
            selectedFile = input.files[0];
            if (selectedFile) {
                document.getElementById('fileName').textContent = selectedFile.name;
                document.getElementById('fileSize').textContent = (selectedFile.size / 1024 / 1024).toFixed(2) + ' MB';
                document.getElementById('fileInfo').style.display = 'block';
                document.getElementById('uploadBtn').style.display = 'block';
                document.getElementById('status').textContent = 'Pronto para enviar!';
            }
        }

        async function uploadFile() {
            if (!selectedFile) {
                alert('Selecione um arquivo primeiro!');
                return;
            }

            const progressContainer = document.getElementById('progressContainer');
            const progressBar = document.getElementById('progressBar');
            const status = document.getElementById('status');
            const result = document.getElementById('result');
            const uploadBtn = document.getElementById('uploadBtn');

            progressContainer.style.display = 'block';
            result.style.display = 'none';
            uploadBtn.disabled = true;
            uploadBtn.textContent = '⏳ Enviando...';
            status.textContent = 'Enviando...';

            try {
                // Use XMLHttpRequest for progress tracking
                const xhr = new XMLHttpRequest();
                
                xhr.upload.addEventListener('progress', (e) => {
                    if (e.lengthComputable) {
                        const percent = (e.loaded / e.total) * 100;
                        progressBar.style.width = percent + '%';
                        status.textContent = `Enviando... ${Math.round(percent)}%`;
                    }
                });

                const uploadPromise = new Promise((resolve, reject) => {
                    xhr.onload = () => {
                        if (xhr.status === 200) {
                            resolve(xhr.responseText);
                        } else {
                            reject(new Error('Erro no upload: ' + xhr.status));
                        }
                    };
                    xhr.onerror = () => reject(new Error('Erro de rede'));
                });

                // For demo purposes, show manual upload instructions
                // Firebase Storage requires server-side upload or authenticated client
                
                status.textContent = '';
                result.className = 'info';
                result.style.display = 'block';
                result.innerHTML = `
                    <h3>⚠️ Upload Automático Não Disponível</h3>
                    <p>Por favor, faça o upload manualmente:</p>
                    <ol style="text-align: left; margin: 15px 0;">
                        <li>Abra: <a href="https://console.firebase.google.com/project/playearn-b001b/storage" target="_blank">Firebase Storage</a></li>
                        <li>Clique em "Upload file" (seta para cima)</li>
                        <li>Selecione este arquivo: <strong>${selectedFile.name}</strong></li>
                        <li>Após upload, a URL será gerada automaticamente</li>
                    </ol>
                    <p><strong>URL do download:</strong></p>
                    <code style="word-break: break-all; background: #0d1117; padding: 10px; display: block; border-radius: 5px;">
                        https://firebasestorage.googleapis.com/v0/b/playearn-b001b.appspot.com/o/apk%2Fcinecash.apk?alt=media
                    </code>
                `;

                uploadBtn.textContent = '📱 Upload para Firebase';
                uploadBtn.disabled = false;

            } catch (error) {
                result.className = 'error';
                result.style.display = 'block';
                result.textContent = 'Erro: ' + error.message;
                uploadBtn.textContent = 'Tentar Novamente';
                uploadBtn.disabled = false;
            }
        }
    </script>
</body>
</html>
